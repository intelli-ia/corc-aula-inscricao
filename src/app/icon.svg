<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="micGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Corpo do microfone -->
  <rect x="35" y="15" width="30" height="45" rx="15" fill="url(#micGradient)" stroke="#1e1b4b" stroke-width="2"/>

  <!-- Grade do microfone -->
  <line x1="35" y1="25" x2="65" y2="25" stroke="#e0e7ff" stroke-width="1.5" opacity="0.6"/>
  <line x1="35" y1="30" x2="65" y2="30" stroke="#e0e7ff" stroke-width="1.5" opacity="0.6"/>
  <line x1="35" y1="35" x2="65" y2="35" stroke="#e0e7ff" stroke-width="1.5" opacity="0.6"/>
  <line x1="35" y1="40" x2="65" y2="40" stroke="#e0e7ff" stroke-width="1.5" opacity="0.6"/>
  <line x1="35" y1="45" x2="65" y2="45" stroke="#e0e7ff" stroke-width="1.5" opacity="0.6"/>
  <line x1="35" y1="50" x2="65" y2="50" stroke="#e0e7ff" stroke-width="1.5" opacity="0.6"/>

  <!-- Suporte inferior -->
  <path d="M 42 60 Q 42 75 50 75 Q 58 75 58 60" fill="none" stroke="#1e1b4b" stroke-width="3" stroke-linecap="round"/>

  <!-- Base -->
  <line x1="50" y1="75" x2="50" y2="82" stroke="#1e1b4b" stroke-width="3" stroke-linecap="round"/>
  <line x1="38" y1="82" x2="62" y2="82" stroke="#1e1b4b" stroke-width="4" stroke-linecap="round"/>
</svg>
